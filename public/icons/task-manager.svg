<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Window frame -->
  <rect x="4" y="3" width="40" height="36" rx="2" fill="#d4d0c8" stroke="#808080" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="4" y="3" width="40" height="10" rx="2" fill="#0a246a" stroke="none"/>
  <rect x="4" y="8" width="40" height="5" fill="#0a246a" stroke="none"/>
  <!-- Title bar text -->
  <text x="8" y="10" font-family="Tahoma, Arial, sans-serif" font-size="5" fill="#ffffff" font-weight="bold">Task Manager</text>
  <!-- Close button -->
  <rect x="37" y="5" width="5" height="4" fill="#cc3333" rx="0.5"/>
  <!-- Tab bar -->
  <rect x="6" y="14" width="10" height="3" fill="#ece9d8" stroke="#808080" stroke-width="0.5"/>
  <text x="7" y="16.5" font-family="Tahoma" font-size="3" fill="#000000">Processes</text>
  <!-- Process list area -->
  <rect x="6" y="18" width="36" height="18" fill="#ffffff" stroke="#a0a0a0" stroke-width="0.5"/>
  <!-- Fake process bars -->
  <rect x="8" y="20" width="20" height="3" fill="#4aa5ff" rx="1"/>
  <rect x="8" y="25" width="16" height="3" fill="#4aa5ff" rx="1" opacity="0.7"/>
  <rect x="8" y="30" width="24" height="3" fill="#4aa5ff" rx="1" opacity="0.5"/>
  <!-- CPU usage text -->
  <text x="8" y="19" font-family="Tahoma" font-size="3.5" fill="#555555">CPU Usage</text>
  <!-- Status bar -->
  <rect x="6" y="36" width="36" height="2" fill="#ece9d8" stroke="#a0a0a0" stroke-width="0.3"/>
  <text x="8" y="37.5" font-family="Tahoma" font-size="3" fill="#555555">Processes: 3  CPU: 12%</text>
</svg>
