<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Drive body -->
  <rect x="2" y="6" width="28" height="20" rx="2" fill="#d4d0c8" stroke="#808080" stroke-width="1.5"/>
  <!-- Drive label area -->
  <rect x="5" y="10" width="22" height="6" rx="1" fill="#3a6ea5"/>
  <!-- Drive label text "D" -->
  <text x="16" y="14.5" text-anchor="middle" font-family="Tahoma" font-size="5" font-weight="bold" fill="white">D:</text>
  <!-- Drive face detail -->
  <rect x="5" y="18" width="14" height="4" rx="0.5" fill="#a0a0a0" stroke="#808080" stroke-width="0.5"/>
  <!-- Drive LED -->
  <circle cx="24" cy="20" r="1" fill="#00cc00" opacity="0.8"/>
</svg>
