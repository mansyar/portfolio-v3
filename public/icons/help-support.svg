<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Book cover -->
  <rect x="6" y="4" width="36" height="40" rx="2" fill="#2255aa" stroke="#1a4488" stroke-width="1.5"/>
  <!-- Book spine -->
  <rect x="6" y="4" width="6" height="40" rx="1" fill="#1a4488" stroke="#1a4488" stroke-width="1"/>
  <!-- Book pages (right side) -->
  <rect x="14" y="6" width="26" height="36" rx="1" fill="#ffffff" stroke="#c0c0c0" stroke-width="1"/>
  <!-- Page lines -->
  <line x1="18" y1="12" x2="36" y2="12" stroke="#cccccc" stroke-width="1"/>
  <line x1="18" y1="16" x2="36" y2="16" stroke="#cccccc" stroke-width="1"/>
  <line x1="18" y1="20" x2="36" y2="20" stroke="#cccccc" stroke-width="1"/>
  <line x1="18" y1="24" x2="36" y2="24" stroke="#cccccc" stroke-width="1"/>
  <line x1="18" y1="28" x2="36" y2="28" stroke="#cccccc" stroke-width="1"/>
  <!-- Question mark on cover -->
  <text x="22" y="32" font-family="Tahoma, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">?</text>
  <!-- Bookmark ribbon -->
  <path d="M36 4 L36 8 L39 6 L42 8 L42 4 Z" fill="#cc3333"/>
</svg>
