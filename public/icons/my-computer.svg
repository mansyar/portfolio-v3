<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Monitor body -->
  <rect x="6" y="4" width="36" height="26" rx="2" fill="#d4d0c8" stroke="#808080" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="9" y="7" width="30" height="20" rx="1" fill="#3a6ea5"/>
  <!-- Screen glow -->
  <rect x="10" y="8" width="28" height="18" rx="1" fill="#e8f0fe" opacity="0.9"/>
  <!-- Stand column -->
  <rect x="22" y="30" width="4" height="6" fill="#808080"/>
  <!-- Stand base -->
  <rect x="14" y="36" width="20" height="3" rx="1.5" fill="#808080"/>
  <!-- Power LED -->
  <circle cx="12" cy="6" r="1" fill="#00cc00" opacity="0.8"/>
  <!-- CD drive slot -->
  <rect x="29" y="6" width="8" height="1.5" fill="#a0a0a0" rx="0.5"/>
  <!-- Screen content - windows logo suggestion -->
  <rect x="14" y="12" width="8" height="6" rx="1" fill="#245edc" opacity="0.6"/>
  <rect x="14" y="20" width="8" height="4" rx="1" fill="#3a6ea5" opacity="0.4"/>
  <rect x="24" y="12" width="10" height="4" rx="1" fill="#3a6ea5" opacity="0.4"/>
  <rect x="24" y="18" width="10" height="6" rx="1" fill="#245edc" opacity="0.3"/>
</svg>
