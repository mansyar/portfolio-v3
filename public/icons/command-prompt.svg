<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Monitor body -->
  <rect x="4" y="3" width="40" height="32" rx="2" fill="#000000" stroke="#555555" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="7" y="6" width="34" height="26" rx="1" fill="#0a0a0a"/>
  <!-- Terminal prompt -->
  <text x="10" y="16" font-family="Consolas, Courier New, monospace" font-size="8" fill="#00aa00">C:\&gt;</text>
  <text x="10" y="24" font-family="Consolas, Courier New, monospace" font-size="8" fill="#00cc00">_</text>
  <!-- Blinking cursor effect -->
  <text x="22" y="24" font-family="Consolas, Courier New, monospace" font-size="8" fill="#00ff00">│</text>
  <!-- Stand column -->
  <rect x="22" y="35" width="4" height="5" fill="#555555"/>
  <!-- Stand base -->
  <rect x="14" y="40" width="20" height="3" rx="1.5" fill="#555555"/>
  <!-- Screen title bar -->
  <rect x="7" y="6" width="34" height="5" rx="1" fill="#1a4488"/>
  <text x="10" y="10" font-family="Tahoma, Arial, sans-serif" font-size="5" fill="#ffffff" font-weight="bold">CMD</text>
  <!-- Close button -->
  <rect x="36" y="7" width="4" height="3" fill="#cc3333" rx="0.5"/>
  <!-- Power LED -->
  <circle cx="12" cy="5" r="1" fill="#00cc00" opacity="0.8"/>
</svg>
