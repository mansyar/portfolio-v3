<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- XP-styled Minesweeper icon -->
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
  </defs>
  
  <!-- Background (gray panel) -->
  <rect width="48" height="48" rx="2" ry="2" fill="url(#ms-bg)"/>
  
  <!-- 3x3 grid lines -->
  <g stroke="#000" stroke-width="1" opacity="0.3">
    <line x1="16" y1="4" x2="16" y2="44"/>
    <line x1="32" y1="4" x2="32" y2="44"/>
    <line x1="4" y1="16" x2="44" y2="16"/>
    <line x1="4" y1="32" x2="44" y2="32"/>
  </g>
  
  <!-- Mine icon (center) -->
  <circle cx="24" cy="24" r="7" fill="#222"/>
  <circle cx="24" cy="24" r="5" fill="#333"/>
  
  <!-- Mine spokes -->
  <g stroke="#222" stroke-width="2" stroke-linecap="round">
    <line x1="24" y1="10" x2="24" y2="14"/>
    <line x1="24" y1="34" x2="24" y2="38"/>
    <line x1="10" y1="24" x2="14" y2="24"/>
    <line x1="34" y1="24" x2="38" y2="24"/>
    <line x1="15" y1="15" x2="18" y2="18"/>
    <line x1="30" y1="30" x2="33" y2="33"/>
    <line x1="15" y1="33" x2="18" y2="30"/>
    <line x1="30" y1="18" x2="33" y2="15"/>
  </g>
  
  <!-- Mine highlight -->
  <circle cx="22" cy="22" r="2" fill="#666" opacity="0.5"/>
  
  <!-- XP shine effect -->
  <rect x="0" y="0" width="48" height="48" rx="2" ry="2" fill="url(#ms-bg)" opacity="0"/>
</svg>
